<h4>{{'rpm-repo.add.head' | translate}}</h4>

<form [formGroup]="repoForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
        <label>{{'rpm-repo.attributes.id' | translate}}</label>
        <input formControlName="id" [ngClass]="valid('id')"
               placeholder="{{'rpm-repo.input.id' | translate}}"/>
        <div class="invalid-feedback">{{'rpm-repo.error.id.pattern' | translate}}</div>
    </div>
    <div class="form-group">
        <label>{{'rpm-repo.attributes.name' | translate}}</label>
        <input formControlName="name" [ngClass]="valid('name')"
               placeholder="{{'rpm-repo.input.name' | translate}}"/>
    </div>
    <div class="form-group">
        <label>{{'rpm-repo.attributes.description' | translate}}</label>
        <input formControlName="description" class="form-control"
               placeholder="{{'rpm-repo.input.description' | translate}}"/>
    </div>
    <div class="form-group">
        <label>{{'rpm-repo.attributes.location' | translate}}</label>
        <input formControlName="location" [ngClass]="valid('location')"
               placeholder="{{'rpm-repo.input.location' | translate}}"/>
    </div>
    <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" formControlName="scanned" id="scanned"/>
        <label class="form-check-label" for="scanned">{{'rpm-repo.attributes.scanned' | translate}}</label>
    </div>
    <div class="form-group">
        <label>{{'rpm-repo.attributes.scheduling_definition' | translate}}</label>
        <input formControlName="scheduling_definition" class="form-control"
               placeholder="{{'rpm-repo.input.scheduling_definition' | translate}}"/>
        <small class="form-text text-muted">{{'rpm-repo.input.small.scheduling_definition' | translate}}</small>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!repoForm.valid">
        {{'rpm-repo.add.submit' | translate}}
    </button>
</form>

<ng-template #successTmpl let-data="contextData">
    {{'rpm-repo.add.success' | translate: {id: data?.id} }}
</ng-template>
<ng-template #errorTmpl let-data="contextData">
    {{'rpm-repo.add.error.title' | translate}}: {{data?.errorMessages?.[0]?.errorKey}}
</ng-template>
