<form class="mt-3 mb-3" [formGroup]="repoForm" (ngSubmit)="onSubmit()">

    <div class="form-group col-md-8">
        <label for="id">{{'npm-repo.attributes.id' | translate}}</label>
        <input type="text" class="form-control-plaintext" formControlName="id" id="id" readonly>
    </div>

    <div class="form-group col-md-8">
        <label for="name">{{'npm-repo.attributes.name' | translate}}</label>
        <input type="text" class="form-control" formControlName="name" id="name"
               [ngClass]="valid('name')"
               placeholder="{{'npm-repo.input.name' | translate}}">
        <div *ngIf="repoForm.get('name').invalid && repoForm.get('name').touched" class="invalid-feedback">
            <div *ngIf="repoForm.get('name').errors?.required">{{'form.error.required' | translate}}</div>
        </div>
    </div>

    <div class="form-group col-md-8">
        <label for="description">{{'npm-repo.attributes.description' | translate}}</label>
        <input type="text" class="form-control" formControlName="description" id="description"
               placeholder="{{'npm-repo.input.description' | translate}}">
    </div>

    <div class="form-group col-md-8">
        <label for="location">{{'npm-repo.attributes.location' | translate}}</label>
        <input type="text" class="form-control" formControlName="location" id="location"
               [ngClass]="valid('location')"
               placeholder="{{'npm-repo.input.location' | translate}}">
        <div *ngIf="repoForm.get('location').invalid && repoForm.get('location').touched" class="invalid-feedback">
            <div *ngIf="repoForm.get('location').errors?.required">{{'form.error.required' | translate}}</div>
        </div>
    </div>

    <div class="form-group col-md-8">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="scanned" id="scanned">
            <label class="form-check-label" for="scanned">{{'npm-repo.attributes.scanned' | translate}}</label>
        </div>
    </div>

    <div class="form-group col-md-8" *ngIf="repoForm.get('scanned').value">
        <label for="scheduling_definition">{{'npm-repo.attributes.scheduling_definition' | translate}}</label>
        <input type="text" class="form-control" formControlName="scheduling_definition"
               id="scheduling_definition"
               placeholder="{{'npm-repo.input.scheduling_definition' | translate}}">
        <small class="form-text text-muted">{{'npm-repo.input.small.scheduling_definition' | translate}}</small>
    </div>

    <div class="form-group col-md-8">
        <button class="btn btn-primary" type="submit"
                [attr.disabled]="repoForm.valid ? null : true">
            {{'npm-repo.edit.submit' | translate}}
        </button>
    </div>

    <ng-template #successTmpl let-repo>
        {{'npm-repo.edit.success' | translate : {id: repo.id} }}
    </ng-template>
    <ng-template #errorTmpl let-messages="error_messages">
        <h4 class="alert-heading">{{'npm-repo.edit.error.title' | translate}}</h4>
        <ng-container *ngFor="let message of messages">
            <hr><p>{{message.message}}</p>
        </ng-container>
    </ng-template>

</form>
