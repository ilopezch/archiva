<app-paginated-entities [service]="service" [sortField]="sortField" [sortOrder]="sortOrder"
                        let-repo="entity">
    <ng-template let-repo="entity">
        <tr>
            <td>{{repo.id}}</td>
            <td>{{repo.name}}</td>
            <td>{{repo.location}}</td>
            <td>
                <a [routerLink]="['/admin/rpm-repositories/edit', repo.id]"
                   class="btn btn-sm btn-outline-secondary mr-1">{{'form.edit' | translate}}</a>
                <button class="btn btn-sm btn-outline-danger"
                        (click)="deleteRepository(repo)">{{'rpm-repo.delete.title' | translate}}</button>
            </td>
        </tr>
    </ng-template>
</app-paginated-entities>

<ng-template #deletedTmpl let-data="contextData">
    {{'rpm-repo.delete.success' | translate: {id: data?.id} }}
</ng-template>
<ng-template #errorTmpl let-data="contextData">
    {{data?.errorMessages?.[0]?.errorKey}}
</ng-template>
